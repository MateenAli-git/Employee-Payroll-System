<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Payroll System</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 100%;
        }

        .full-width {
            grid-column: span 2;
        }

        button {
            padding: 10px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .table-section {
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #4facfe;
            color: white;
        }

        tr:hover {
            background: #f5f5f5;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Employee Payroll System</h1>

    <!-- Form Section -->
    <div class="form-section">
        <input type="text" placeholder="Employee Name">
        <input type="text" placeholder="Employee ID">

        <input type="number" placeholder="Basic Salary">
        <input type="number" placeholder="Allowances">

        <input type="number" placeholder="Deductions">
        <input type="text" placeholder="Department">

        <button class="full-width">Add Employee</button>
    </div>

    <div class="table-section">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Basic</th>
                    <th>Allowances</th>
                    <th>Deductions</th>
                    <th>Net Salary</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>001</td>
                    <td>Ali Khan</td>
                    <td>50000</td>
                    <td>5000</td>
                    <td>2000</td>
                    <td>53000</td>
                </tr>
                <tr>
                    <td>002</td>
                    <td>Sara Ahmed</td>
                    <td>60000</td>
                    <td>4000</td>
                    <td>3000</td>
                    <td>61000</td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

</body>
</html>
